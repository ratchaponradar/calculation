<!DOCTYPE html>
<html lang="th">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>โปรแกรมคำนวณค่าเดินทาง</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
            rel="stylesheet">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <style>
        :root {
            --primary: #334756;
            --accent: #4e6e81;
            --bg: #f4f7f9;
        }

        body {
            background-color: var(--bg);
            font-family: 'Kanit', sans-serif;
            padding: 20px;
        }

        .main-card {
            border-radius: 36px;
            border: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            margin: auto;
            padding: 30px;
            background: #fff;
        }

        .section-label {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 8px;
            display: block;
        }

        .btn-check-custom {
            display: none;
        }

        .btn-label {
            cursor: pointer;
            padding: 8px 8px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: 0.3s;
            flex: 1;
            text-align: center;
        }

        .btn-check-custom:checked+.btn-label {
            background-color: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .input-group-lg .btn {
            background: #e2e8f0;
            border: none;
        }

        .live-total {
            background: var(--primary);
            color: #fff;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin: 25px 0;
        }

        .live-total span {
            font-size: 2.5rem;
            font-weight: 600;
            display: block;
        }

        .divider {
            border-left: 1px solid #e2e8f0;
            margin: 0 15px;
            height: 40px;
        }
        .main-card {
    position: relative; /* สำคัญ: เพื่อให้เวอร์ชันอ้างอิงตำแหน่งจาก Card นี้ */
    padding-bottom: 2rem; /* เพิ่ม padding ด้านล่าง เพื่อไม่ให้ข้อความไปทับเนื้อหาข้างใน */
}
    </style>
    </head>

    <body>
        <div class="container">
            <div class="card main-card">
                <div
                    style="position: absolute; bottom: 10px; font-size: 0.7rem; color: #adb5bd; pointer-events: none;">
                    เวอร์ชั่น 1.0.4 | Ratchapon
                </div>

                <h4 class="mb-4 fw-bold text-center"
                    style="color: var(--primary);">โปรแกรมคำนวณค่าเดินทาง</h4>
                <div class="row mb-4">
                    <label class="section-label mb-2">จำนวนผู้เดินทาง (ขรก.
                        พรก.)</label>
                    <div class="d-flex align-items-center gap-1"
                        style="flex-wrap: wrap;">

                        <div id="peopleContainer"
                            class="d-flex gap-2 flex-grow-1">
                        </div>

                        <div style="min-width: 80px;">
                            <input type="checkbox" id="hasDriver"
                                class="btn-check-custom" onchange="calculate()">
                            <label class="btn-label w-100" for="hasDriver">
                                <span
                                    class="d-none d-md-inline">พนักงานขับรถ</span>
                                <span class="d-md-none">พขร.</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="section-label">จำนวนวัน</label>
                        <div class="input-group input-group-lg">
                            <button class="btn"
                                onclick="changeDays(-1)">-</button>
                            <input type="number" id="days"
                                class="form-control text-center" value="1"
                                min="1"
                                oninput="calculate()">
                            <button class="btn"
                                onclick="changeDays(1)">+</button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="section-label">ค่าน้ำมัน (บาท)</label>
                        <input type="number" id="fuel"
                            class="form-control form-control-lg" value="0"
                            oninput="calculate()"
                            onfocus="this.select()"> </div>
                </div>
                <div class="live-total">
                    <small style="opacity: 0.8;">รวมทั้งสิ้น</small>
                    <span id="out-total">0</span> บาท
                </div>
                <button class="btn w-100 py-3 fw-bold text-white"
                    style="background: var(--accent); border-radius: 12px;"
                    onclick="showDetail()">ดูรายละเอียดสรุป</button>
            </div>

        </div>

        <script>
        const container = document.getElementById('peopleContainer');
        [1, 2, 3, 4].forEach(n => {
            container.innerHTML += `<input type="radio" name="people" id="p${n}" value="${n}" class="btn-check-custom" ${n === 1 ? 'checked' : ''} onchange="calculate()"><label class="btn-label" for="p${n}">${n}</label>`;
        });

        function changeDays(val) {
            const input = document.getElementById('days');
            let newVal = parseInt(input.value) + val;
            if (newVal >= 1) { input.value = newVal; calculate(); }
        }

        function getCalculationData() {
            const people = parseInt(document.querySelector('input[name="people"]:checked').value);
            const hasDriver = document.getElementById('hasDriver').checked;
            const days = parseInt(document.getElementById('days').value) || 1;
            const nights = days > 1 ? days - 1 : 0;
            const fuel = parseInt(document.getElementById('fuel').value) || 0;

            const perDiemStaff = 240 * days;
            const perNightStaff = 800 * nights;
            const perStaff = perDiemStaff + perNightStaff;

            const perDiemDriver = 200 * days;
            const perNightDriver = 800 * nights;
            const perDriver = perDiemDriver + perNightDriver;

            return {
                people, hasDriver, days, nights, fuel,
                perDiemStaff, perNightStaff, perStaff,
                perDiemDriver, perNightDriver, perDriver,
                staffTotal: people * perStaff,
                driverTotal: hasDriver ? perDriver : 0,
                total: (people * perStaff) + (hasDriver ? perDriver : 0) + fuel
            };
        }

        function calculate() {
            const data = getCalculationData();
            document.getElementById('out-total').innerText = data.total.toLocaleString();
        }

        function showDetail() {
            const data = getCalculationData();
            let driverNote = data.hasDriver ? `<li><b>พขร. :</b> เบี้ยเลี้ยง 200 บาท/วัน | ที่พัก 800 บาท/คืน</li>` : '';

            Swal.fire({
                title: 'รายงานสรุปค่าใช้จ่ายเดินทาง',
                width: '900px',
                // เพิ่มตรงนี้เพื่อปรับขอบโค้งมน
                customClass: {
                    popup: 'my-rounded-popup'
                },
                // ใส่ CSS สำหรับคลาสนี้
                didRender: () => {
                    const popup = Swal.getPopup();
                    popup.style.borderRadius = '36px';
                },
                html: `
                        <style>
                        /* ปรับกรอบ Swal ให้โค้ง 36px */
                        .swal2-popup {
                            border-radius: 36px !important;
                        }

                        /* ปรับตารางภายในให้โค้งมนและดูสะอาดตา */

                        .bg-per-person { background-color: #eef7ff !important; } /* สีฟ้าอ่อนสำหรับกลุ่มต่อคน */
                        .bg-total { background-color: #fff3e0 !important; }      /* สีส้มอ่อนสำหรับกลุ่มรวม */
    
                        .table-rounded {
                            border-collapse: separate;
                            border-spacing: 0;
                            border-radius: 20px;
                            overflow: hidden; /* ทำให้มุมของตารางโค้ง */
                            border: 1px solid #dee2e6; /* เส้นขอบนอก */
                            width: 100%;
                        }

                        .table-rounded th, 
                        .table-rounded td {
                            padding: 10px 15px; /* เพิ่มระยะห่างจากขอบ (ใช้ 10px บน/ล่าง และ 15px ซ้าย/ขวา เพื่อความโปร่ง) */
                            border: 1px solid #dee2e6; /* เส้นตารางชัดเจนทุกช่อง */}
                        .table-nowrap th, 
                        .table-nowrap td {
                            white-space: nowrap;

                        }


                        </style>

                        <div class="text-start" style="font-size: 1.1rem;">
                            <div class="report-header text-center mb-4 p-3" style="background: #f8f9fa; border-radius: 26px; border: 1px solid #dee2e6;">
                                <p class="mb-1">ระยะเวลาการเดินทาง</p>
                                <b class="text-primary fs-2">${data.days} วัน | ${data.nights} คืน</b>
                            </div>
                            <div class="table-responsive">
                               <table class="table table-bordered table-sm table-rounded table-nowrap" style="font-size: 1rem;">
                                    <thead class="table-light">
                                        <tr>
                                            <th rowspan="2" class="align-middle">รายการ</th>
                                            <th colspan="2" class="text-center bg-per-person">ค่าเดินทาง/คน</th>
                                            <th rowspan="2" class="align-middle text-center">จำนวนคน</th>
                                            <th colspan="2" class="text-center bg-total">ค่าเดินทางรวม</th>
                                            <th rowspan="2" class="align-middle text-end">รวมทั้งหมด</th>
                                        </tr>
                                        <tr class="table-light">
                                            <th class="text-end bg-per-person">เบี้ยเลี้ยง/คน</th>
                                            <th class="text-end bg-per-person">ที่พัก/คน</th>
                                            <th class="text-end bg-total">เบี้ยเลี้ยง</th>
                                            <th class="text-end bg-total">ที่พัก</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td>ขรก./พรก.</td>
                                            <td class="text-end bg-per-person">${data.perDiemStaff.toLocaleString()}</td>
                                            <td class="text-end bg-per-person">${data.perNightStaff.toLocaleString()}</td>
                                            <td class="text-center">${data.people}</td>
                                            <td class="text-end bg-total">${(data.perDiemStaff * data.people).toLocaleString()}</td>
                                            <td class="text-end bg-total">${(data.perNightStaff * data.people).toLocaleString()}</td>
                                            <td class="text-end fw-bold">${data.staffTotal.toLocaleString()}</td>
                                        </tr>
                                        ${data.hasDriver ? `
                                        <tr>
                                            <td>พนักงานขับรถ</td>
                                            <td class="text-end bg-per-person">${data.perDiemDriver.toLocaleString()}</td>
                                            <td class="text-end bg-per-person">${data.perNightDriver.toLocaleString()}</td>
                                            <td class="text-center">1</td>
                                            <td class="text-end bg-total">${data.perDiemDriver.toLocaleString()}</td>
                                            <td class="text-end bg-total">${data.perNightDriver.toLocaleString()}</td>
                                            <td class="text-end fw-bold">${data.driverTotal.toLocaleString()}</td>
                                        </tr>` : ''}
                                        <tr>
                                            <td colspan="6" class="text-end">ค่าน้ำมันเชื้อเพลิง</td>
                                            <td class="text-end fw-bold">${data.fuel.toLocaleString()}</td>
                                        </tr>
                                    </tbody>
                                    <tfoot>
                                        <tr class="fw-bold" style="background-color: #f1f5f9;">
                                            <td colspan="6" class="text-end">ยอดรวมทั้งสิ้น</td>
                                            <td class="text-end text-primary fs-5">${data.total.toLocaleString()} บาท</td>
                                        </tr>
                                    </tfoot>
                                </table>    
                            </div>

                            <div class="mt-3 p-3 bg-light border-start border-primary border-4" style="font-size: 0.95rem;">
                                <b>หมายเหตุและเรทการคำนวณ:</b>
                                <ul class="mb-0 ps-4">
                                    <li><b>ขรก./พรก. :</b> เบี้ยเลี้ยง 240 บาท/วัน | ที่พัก 800 บาท/คืน</li>
                                    ${driverNote}
                                </ul>
                            </div>
                        </div>`,
                confirmButtonText: 'ปิดหน้าต่าง',
                confirmButtonColor: '#334756',
                customClass: {
                    title: 'fs-3' // เพิ่มขนาดตัวหนังสือตรงหัวข้อ Swal ให้ใหญ่ขึ้นด้วย
                }
            });
        }
        calculate();
    </script>
    </body>

</html>
